server {
    listen 3000;
    server_name _;

    # Root: serve files from the React build output
    root /usr/share/nginx/html;
    index index.html;

    # CRITICAL for React Router HTML5 history mode:
    # Without this, refreshing /tasks/TASK-1001 returns 404
    # because Nginx looks for a physical file at that path.
    # try_files falls back to index.html, letting React Router
    # handle the route on the client side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache headers for hashed filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip compression — reduces bundle size over network
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
}
