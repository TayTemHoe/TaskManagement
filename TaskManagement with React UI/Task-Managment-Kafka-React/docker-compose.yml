version: '3.8'

# ================================================================
# FULL DOCKER SETUP — Spring Boot App + MongoDB + Kafka
#
# Run everything:   docker compose up -d --build
# Stop everything:  docker compose down
# Wipe all data:    docker compose down -v
#
# NOTE: When Spring Boot runs inside a container, it cannot use
# "localhost" to reach MongoDB or Kafka (localhost = itself).
# Use the container NAME as the hostname instead:
#   mongodb:27017  (not localhost:27017)
#   kafka:9092     (not localhost:9092)
# ================================================================

services:

  # ============================================================
  # Spring Boot Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-management-app
    ports:
      - "8080:8080"
    environment:
      # Override localhost values from application.properties
      SPRING_MONGODB_URI: mongodb://mongodb:27017/taskDB
      SPRING_MONGODB_DATABASE: taskDB
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      #Add Keycloak issuer URI (uses container name 'keycloak' on task-network)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: \
        http://keycloak:8180/realms/internship-task-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: \
        http://keycloak:8180/realms/internship-task-realm/protocol/openid-connect/certs
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_started
      keycloak:
        condition: service_healthy
      kafka:
          condition: service_healthy
    restart: on-failure
    networks:
      - task-network

  # ============================================================
  # MongoDB
  # ============================================================
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - task-network

  # ============================================================
  # Apache Kafka (KRaft mode — no Zookeeper)
  # KAFKA_ADVERTISED_LISTENERS must use the container name "kafka"
  # so other containers can reach it. "localhost" would only
  # ============================================================
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    networks:
      - task-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: keycloak
    command: start-dev --import-realm    # start in dev mode and import realm on first boot
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180                 # use 8180 to avoid conflict with app on 8080
      KC_HOSTNAME_STRICT: false          # allow any hostname (dev mode)
      KC_HTTP_ENABLED: true
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak:/opt/keycloak/data/import   # mount our realm JSON here
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8180/realms/internship-task-realm || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - task-network


volumes:
  mongo_data:

networks:
  task-network:
    driver: bridge
