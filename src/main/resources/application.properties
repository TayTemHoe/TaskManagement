# ==============================================
# Application
# ==============================================
spring.application.name=SpringB-Kafka-MongoDB-Demo

# ==============================================
# MongoDB ? Reactive
# When running locally (IntelliJ): uses localhost
# When running in Docker container: overridden by docker-compose environment variable
# ==============================================
spring.mongodb.uri=mongodb://localhost:27017/taskDB
spring.mongodb.database=taskDB

# ==============================================
# Kafka Broker
# When running locally: localhost:9092
# When running in Docker container: overridden by docker-compose environment variable
# ==============================================
spring.kafka.bootstrap-servers=localhost:9092

# ==============================================
# Kafka Producer
# ==============================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ==============================================
# Kafka Consumer
# ==============================================
spring.kafka.consumer.group-id=task-management-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=org.example.tay.springbkafkamongodbdemo.shared.dto.TaskEventDTO
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Kafka producer ? survive slow Kafka startup
spring.kafka.producer.retries=10
spring.kafka.producer.properties.retry.backoff.ms=2000

# Admin ? don't fail hard if topic already exists
spring.kafka.admin.fail-fast=false
spring.kafka.admin.properties.request.timeout.ms=30000

# ==============================================
# Kafka Topic
# NOTE: Do NOT use dots inside custom @Value property keys.
# Use kafka.topic.name, NOT kafka.topic.task-events
# ==============================================
kafka.topic.name=task-events

# ==============================================
# Jackson ? THIS applies to the Spring Boot ObjectMapper
# which JsonSerializer/JsonDeserializer will pick up automatically
# ==============================================
spring.jackson.deserialization.fail-on-unknown-properties=false

