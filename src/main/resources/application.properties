# ==============================================
# Application
# ==============================================
spring.application.name=SpringB-Kafka-MongoDB-Demo

# ==============================================
# MongoDB — Reactive
# When running locally (IntelliJ): uses localhost
# When running in Docker container: overridden by docker-compose environment variable
# ==============================================
spring.data.mongodb.uri=mongodb://localhost:27017/taskdb
spring.data.mongodb.database=taskdb

# ==============================================
# Kafka Broker
# When running locally: localhost:9092
# When running in Docker container: overridden by docker-compose environment variable
# ==============================================
spring.kafka.bootstrap-servers=localhost:9092

# ==============================================
# Kafka Producer
# ==============================================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ==============================================
# Kafka Consumer — ErrorHandlingDeserializer prevents crashes on bad messages
# ==============================================
spring.kafka.consumer.group-id=task-management-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=org.example.tay.springbkafkamongodbdemo.shared.dto.TaskEventDTO

# ==============================================
# Kafka Topic
# NOTE: Do NOT use dots inside custom @Value property keys.
# Use kafka.topic.name, NOT kafka.topic.task-events
# ==============================================
kafka.topic.name=task-events

# ==============================================
# Jackson — serialise LocalDate and LocalDateTime as string
# ==============================================
spring.jackson.serialization.write-dates-as-timestamps=false
